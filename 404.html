<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — bio.</title>
<meta name="robots" content="noindex">
<style>
  :root{color-scheme:light only}
  html,body{margin:0;height:100%;background:#EFEAE0;color:#1A1915;font-family:"Instrument Sans",system-ui,sans-serif}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:400;font-size:clamp(28px,6vw,44px);margin:0 0 12px;letter-spacing:-0.01em}
  p{max-width:40ch;line-height:1.6;color:#403D34;margin:0 0 28px}
  a.btn{display:inline-block;background:#8B3A2E;color:#EFEAE0;text-decoration:none;padding:13px 26px;border-radius:2px;font-size:15px}
  a.btn:hover{background:#742F25}
  .mono{font-family:"IBM Plex Mono",monospace;font-size:12px;color:#8E9582;margin-top:30px}
</style>
<script>
  (function(){
    var h = location.hash || '';
    if (h.indexOf('#/') === 0) { location.replace(h.slice(1).replace(/^\/?/, '/')); }
  })();
</script>
</head>
<body>
  <div class="wrap">
    <h1>This page wandered off.</h1>
    <p>The link may be old or mistyped. Everything you need — the retainers, the test results, the order page — is a click away.</p>
    <a class="btn" href="/">Return home</a>
    <div class="mono">bio. — getbiodental.co.uk</div>
  </div>
</body>
</html>
